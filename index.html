<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vidhub 搜索</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
        #search-bar { margin-bottom: 20px; }
        #search-bar input { width: 300px; padding: 8px; font-size: 16px; }
        #search-bar button { padding: 8px 12px; font-size: 16px; cursor: pointer; }
        #results { display: flex; flex-wrap: wrap; gap: 20px; }
        .video-item { background: #fff; padding: 10px; border-radius: 6px; width: 200px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .video-item img { width: 100%; height: auto; border-radius: 4px; }
        .video-item h3 { font-size: 16px; margin: 10px 0; height: 36px; overflow: hidden; }
        .video-item a { display: inline-block; margin-right: 5px; margin-bottom: 5px; text-decoration: none; color: #fff; background: #007BFF; padding: 5px 8px; border-radius: 4px; font-size: 14px; }
        .video-item a:hover { background: #0056b3; }
    </style>
</head>
<body>

<div id="search-bar">
    <input type="text" id="search-input" placeholder="输入关键词搜索">
    <button onclick="search()">搜索</button>
</div>

<div id="results"></div>

<script>
function search() {
    const keyword = document.getElementById('search-input').value.trim();
    if (!keyword) return alert("请输入关键词");

    fetch(`/search?wd=${encodeURIComponent(keyword)}`)
        .then(res => res.json())
        .then(data => {
            const container = document.getElementById('results');
            container.innerHTML = '';

            if (data.length === 0) {
                container.innerHTML = '<p>没有找到相关视频</p>';
                return;
            }

            data.forEach(item => {
                const div = document.createElement('div');
                div.className = 'video-item';
                div.innerHTML = `
                    <img src="${item.cover}" alt="${item.title}">
                    <h3>${item.title}</h3>
                    <a href="${item.detail}" target="_blank">详情</a>
                    <a href="${item.play}" target="_blank">播放</a>
                `;
                container.appendChild(div);
            });
        })
        .catch(err => {
            console.error(err);
            alert("搜索失败，请稍后再试");
        });
}
</script>

</body>
</html>
