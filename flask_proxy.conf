# Matches paths starting with /search, /detail, or /play.
# The (/|$) part is crucial: 
#   - '/' ensures it matches directories like /play/123.
#   - '$' ensures it matches the exact path /play.
# This prevents it from matching 'player.php' because 'play' is followed by 'e', 
# which is neither a slash nor the end of the string.

# location ~ ^/(search|detail|play) {
location ~ ^/(search|detail|play)(/|$) {
    proxy_pass http://127.0.0.1:5000;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
	proxy_set_header X-Forwarded-Proto $scheme;

    proxy_buffering off;
    proxy_read_timeout 120s;
}
